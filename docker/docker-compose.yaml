version: '3.8'

services:
  # Selenium Browser Container
  chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900" # To view the VNC desktop in browser
    shm_size: 2gb # Crucial for Chrome to prevent crashing

  # Your Java Test Runner
  test-runner:
    build: .
    depends_on:
      - chrome
    environment:
      - SELENIUM_REMOTE_URL=http://chrome:4444/wd/hub
    volumes:
      - ./target/cucumber-reports:/usr/src/app/target/cucumber-reports